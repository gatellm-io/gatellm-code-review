            ${{ inputs.prompt }}
            </review-guidelines>

            最终输出要求：
            - 只发**一条** PR 评论（用 Bash 工具执行 `gh pr comment`），不要发多条。
            - 评论开头一行说明这是 N 个模型（列出模型名）的联合 review 汇总。
            - 评论结构：
              - 开头说明联合 review 的模型列表
              - 合并去重后的 findings 分析（含置信度标注，按严重性排序）
              - 统一的 `## TODO 修改清单`（唯一权威清单，连续编号 TODO-1..n）
              - "Requires manual attention" 合并节
              - 失败模型缺席说明（如有）
              - 底部附上各模型原始 review，每个模型一个折叠块，格式：
                <details>
                <summary>原始 Review：<model-name></summary>
                （原始内容，注意 <details> 标签与内容之间必须留空行，markdown 才能正确渲染）
                </details>
            - GitHub 评论上限 65536 字符：如原始 review 总量过大，可对折叠块内容做等比截断并注明"已截断，完整内容见 workflow artifacts"，但汇总正文与 TODO 清单不得截断。
            - 除这条评论外不要做任何其他 PR 操作。

# 示例：以 Reusable Workflow 形式调用 Claude Auto Review（支持多模型）
# 把本文件放到调用方 repo 的 .github/workflows/pr-review.yml 即可使用

name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    uses: gatellm-io/gatellm-code-review/.github/workflows/claude-auto-review.yml@v1
    secrets: inherit   # 让 CODE_REVIEW_ANTHROPIC_AUTH_TOKEN 透传到 reusable workflow
    with:
      runs_on: "self-hosted, Linux, fargate-runner"

      # —— 单模型模式（默认）——
      # 留空 models 即可，使用 model 单模型 review，输出直接发 PR 评论
      # model: deepseek-v4-pro

      # —— 多模型模式 ——
      # 传入 ≥2 个模型启用并行 review + 汇总；最多 3 个，超出截断
      # models: "deepseek-v4-pro,claude-sonnet-4,glm-4-plus"
      # summary_model: "claude-sonnet-4"   # 为空时取 models 的第一个

      # —— 通用参数（均有默认值，按需覆盖）——
      # max_lines: 10000
      # user_request: ""
      # prompt: |
      #   自定义 Review 提示词...

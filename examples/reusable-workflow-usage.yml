# 示例：以 Reusable Workflow 形式调用 Claude Auto Review
# 把本文件放到调用方 repo 的 .github/workflows/pr-review.yml 即可使用

name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # 注意：uses 的 @v1 与 with.action_ref: v1 保持一致，保证拉取同一版本 action.yml
    uses: gatellm-io/gatellm-code-review/.github/workflows/claude-auto-review.yml@v1
    secrets: inherit   # 让 CODE_REVIEW_ANTHROPIC_AUTH_TOKEN 透传到 reusable workflow
    with:
      action_ref: v1
      runs_on: "self-hosted, Linux, fargate-runner"
      # 其余 inputs 均有默认值，按需覆盖
      # model: deepseek-v4-pro
      # max_lines: 10000
      # user_request: ""
